name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload standalone build to server
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          tar --exclude='.git' \
              -czf - .next/standalone | \
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p /var/www/chain-screener/frontend && cd /var/www/chain-screener/frontend && rm -rf standalone && tar -xzf -"

      - name: Restart frontend
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -e
            pm2 delete chainscreener-frontend 2>/dev/null || true
            PORT=3002 HOSTNAME=0.0.0.0 pm2 start /var/www/chain-screener/frontend/.next/standalone/server.js \
              --name chainscreener-frontend
            pm2 save
          "
